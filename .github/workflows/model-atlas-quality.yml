name: Model Atlas Quality

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Build and QA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run product quality gate
        run: npm run qa:ci

      - name: Upload visual QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-atlas-visual-qa
          path: |
            site/visual-qa/*.png
            site/visual-qa/auto-visual-qa-report.md
          if-no-files-found: ignore
